  wrap.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = opt.text;
    btn.onclick = () => {
      wrap.remove();
      opt.action();
    };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollChat();
  return wrap;
}

function showTyping(isAI = false) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing';
  row.innerHTML = `
    <div class="msg-av bot">🦉</div>
    <div class="bubble bot">
      <div class="${isAI ? 'ai-thinking' : 'typing-dots'}"><span></span><span></span><span></span></div>
    </div>
  `;
  chat.appendChild(row);
  scrollChat();
  if (talkMode) showTalkStatus('thinking');
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function formatText(text) {
  // Простое экранирование + поддержка переносов строк
  return escapeHtml(text).replace(/\n/g, '<br>');
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function scrollChat() {
  const chat = document.getElementById('chat');
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

// =============== ОТПРАВКА СООБЩЕНИЙ ===============
function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text && !state.photoData) return;
  if (!state.subject) { pick('free'); }

  // Показать сообщение пользователя
  addUserMsg(text || '📸 Фото', state.photoData);
  const photoToSend = state.photoData;
  inp.value = '';
  resize(inp);
  removePhoto();

  // Если фото — сразу к ИИ (фото мы сами не разберём)
  if (photoToSend) {
    askAI(text || 'Помоги решить задачу с фото', photoToSend);
    return;
  }

  // Сначала ищем ответ сами!
  const localAnswer = tryLocalAnswer(text);
  if (localAnswer) {
    showTyping(false);
    setTimeout(() => {
      hideTyping();
      addBotMsg(localAnswer, state.subject);
      addXP(5);
    }, 400 + Math.random() * 300);
    return;
  }

  // Не знаем — предлагаем кнопку «Спросить ИИ»
  showTyping(false);
  setTimeout(() => {
    hideTyping();
    addBotMsg('Хм, на этот вопрос я сама не отвечу 🤔 Хочешь, спросим у ИИ?', state.subject);
    showQuickReplies([
      { text: '⭐ Да, спросить ИИ', action: () => askAI(text) },
      { text: '✏️ Спрошу иначе', action: () => {
        const inp = document.getElementById('inp');
        inp.value = text;
        inp.focus();
        resize(inp);
      }},
    ]);
  }, 500);
}

// Локальный ответ: математика + база знаний + социальное
function tryLocalAnswer(text) {
  // 1) Социальные фразы (привет, спасибо и т.д.)
  const social = findSocial(text);
  if (social) return social;

  // 2) Простой пример с числами (если математика или свободный режим)
  if (state.subject === 'math' || state.subject === 'free' || /^[\d\s+\-*/×÷.,()=?]+$/.test(text)) {
    const calc = tryCalc(text);
    if (calc) return calc;
  }

  // 3) База знаний
  const kb = findInKnowledge(text, state.subject);
  if (kb) return kb;

  return null;
}

// Простой вычислитель арифметики
function tryCalc(text) {
  // Чистим: убираем «сколько будет», «=», «?»
  let expr = text.toLowerCase()
    .replace(/сколько\s+будет/g, '')
    .replace(/чему\s+равно/g, '')
    .replace(/посчитай/g, '')
    .replace(/реши\s+пример/g, '')
    .replace(/[?=]/g, '')
    .replace(/×/g, '*')
    .replace(/÷/g, '/')
    .replace(/,/g, '.')
    .replace(/плюс/g, '+')
    .replace(/минус/g, '-')
    .replace(/умножить\s+на/g, '*')
    .replace(/разделить\s+на/g, '/')
    .replace(/делить\s+на/g, '/')
    .replace(/умножь/g, '*')
    .trim();
  // Только цифры и операторы
  if (!/^[\d\s+\-*/.()]+$/.test(expr)) return null;
  if (!/[+\-*/]/.test(expr)) return null; // нужен хотя бы один оператор
  if (expr.length > 50) return null;
  try {
    const result = Function('"use strict"; return (' + expr + ')')();
    if (typeof result !== 'number' || !isFinite(result)) return null;
    const pretty = Number.isInteger(result) ? result : Math.round(result * 1000) / 1000;
    return `${expr.replace(/\*/g,'×').replace(/\//g,'÷')} = ${pretty} 🎯`;
  } catch (e) { return null; }
}

// =============== ИИ ===============
async function sendAI() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text && !state.photoData) {
    addBotMsg('Напиши вопрос или прикрепи фото — и я спрошу ИИ! 📸', state.subject);
    return;
  }
  if (!state.subject) pick('free');
  addUserMsg(text || '📸 Фото', state.photoData);
  const photoToSend = state.photoData;
  inp.value = '';
  resize(inp);
  removePhoto();
  askAI(text || 'Помоги с задачей на фото', photoToSend);
}

async function askAI(question, photoData = null) {
  showTyping(true);
  const subj = SUBJECTS[state.subject || 'free'];
  
  // Формируем сообщение
  const userContent = photoData
    ? [
        { type: 'text', text: question },
        { type: 'image_url', image_url: { url: photoData } }
      ]
    : question;

  // История диалога — последние 6 сообщений для контекста
  const recent = state.history.slice(-6);

  const messages = [
    { role: 'system', content: subj.prompt + ' Отвечай кратко (3-5 предложений), используй эмодзи. Объясняй для 5 класса.' },
    ...recent,
    { role: 'user', content: userContent }
  ];

  try {
    const response = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + CONFIG.API_KEY
      },
      body: JSON.stringify({
        model: CONFIG.MODEL,
        messages: messages,
        max_tokens: 600,
        temperature: 0.6
      })
    });
    if (!response.ok) throw new Error('Status ' + response.status);
    const data = await response.json();
    const answer = data.choices?.[0]?.message?.content || 'Не получилось ответить, попробуй ещё раз 🤔';
    
    hideTyping();
    addBotMsg(answer, state.subject, true);
    
    // Сохраняем в историю
    state.history.push({ role: 'user', content: question });
    state.history.push({ role: 'assistant', content: answer });
    if (state.history.length > 20) state.history = state.history.slice(-20);
    
    addXP(10);
  } catch (e) {
    hideTyping();
    addBotMsg('Не получилось связаться с ИИ 😔 Проверь интернет и попробуй ещё раз!', state.subject);
    console.error(e);
  }
}

// =============== ВВОД ===============
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// =============== ФОТО ===============
function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state.photoData = ev.target.result;
    document.getElementById('photoThumb').src = state.photoData;
    document.getElementById('photoPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
  e.target.value = ''; // сброс, чтобы можно было выбрать то же фото снова
}

function removePhoto() {
  state.photoData = null;
  document.getElementById('photoPreview').style.display = 'none';
}

// =============== ГОЛОС (озвучка) ===============
let currentUtter = null;
function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  // Чистим текст от эмодзи и тегов для озвучки
  const clean = text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim();
  if (!clean) return;
  speechSynthesis.cancel();
  
  // В режиме «Разговор» — останавливаем распознавание, пока говорим
  if (talkMode && recognition && isListening) {
    try { recognition.stop(); } catch (e) {}
  }
  
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = state.subject === 'eng' ? 'en-US' : 'ru-RU';
  u.rate = 1.0;
  u.pitch = 1.1;
  // Подбираем женский голос
  const voices = speechSynthesis.getVoices();
  const female = voices.find(v => /female|milena|samantha|alena|kira/i.test(v.name) && v.lang.startsWith(u.lang.slice(0,2)))
              || voices.find(v => v.lang.startsWith(u.lang.slice(0,2)));
  if (female) u.voice = female;
  
  u.onstart = () => {
    isSpeaking = true;
    if (talkMode) showTalkStatus('speaking');
  };
  u.onend = () => {
    isSpeaking = false;
    // После того как УмняшКа замолчала — снова слушаем (если в режиме «Разговор»)
    if (talkMode) {
      setTimeout(() => {
        if (talkMode && !isSpeaking) startListening();
      }, 300);
    }
  };
  u.onerror = () => {
    isSpeaking = false;
    if (talkMode) {
      setTimeout(() => { if (talkMode) startListening(); }, 300);
    }
  };
  
  currentUtter = u;
  speechSynthesis.speak(u);
}

function speak(msgId) {
  const el = document.getElementById(msgId);
  if (!el) return;
  // Берём только текст ответа, без тегов и кнопок
  const textEl = el.querySelector('div');
  const text = textEl ? textEl.textContent : el.textContent;
  speakText(text);
}

function toggleVoice() {
  state.voiceOn = !state.voiceOn;
  localStorage.setItem('umnyashka_voice', state.voiceOn ? 'on' : 'off');
  updateVoiceBtn();
  if (!state.voiceOn) speechSynthesis.cancel();
}

function updateVoiceBtn() {
  const btn = document.getElementById('voiceBtn');
  if (state.voiceOn) {
    btn.classList.remove('off');
    btn.textContent = '🔊';
  } else {
    btn.classList.add('off');
    btn.textContent = '🔇';
  }
}

// =============== МИКРОФОН ===============
let recognition = null;
let isListening = false;
let talkMode = false;        // режим непрерывного разговора
let isSpeaking = false;      // УмняшКа сейчас говорит
let silenceTimer = null;     // таймер тишины для авто-отправки
let lastTranscript = '';     // последний распознанный текст
let restartTimer = null;     // таймер перезапуска распознавания

function ensureRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  if (recognition) return recognition;
  recognition = new SR();
  recognition.lang = state.subject === 'eng' ? 'en-US' : 'ru-RU';
  recognition.continuous = true;       // непрерывный режим
  recognition.interimResults = true;   // промежуточные результаты — для ловли пауз
  
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    if (talkMode) showTalkStatus('listening');
  };
  
  recognition.onresult = (e) => {
    // Собираем последний результат
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const txt = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += txt;
      else interim += txt;
    }
    const fullText = (final + interim).trim();
    if (!fullText) return;
    lastTranscript = fullText;
    
    // В обычном режиме — просто вставляем в поле
    if (!talkMode) {
      document.getElementById('inp').value = fullText;
      resize(document.getElementById('inp'));
      return;
    }
    
    // В режиме «Разговор» — детектим паузу
    // Сбрасываем таймер при каждом новом куске речи
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      // Тишина 1.5 сек — отправляем
      if (lastTranscript && lastTranscript.length > 1) {
        handleVoiceInput(lastTranscript);
        lastTranscript = '';
      }
    }, 1500);
  };
  
  recognition.onerror = (e) => {
    console.warn('Распознавание ошибка:', e.error);
    if (e.error === 'not-allowed' || e.error === 'permission-denied') {
      addBotMsg('Не получаю доступ к микрофону 😔 Разреши его в настройках браузера.', state.subject);
      stopTalkMode();
    }
  };
  
  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    // В режиме «Разговор» — автоперезапуск, если не говорим сами
    if (talkMode && !isSpeaking) {
      restartTimer = setTimeout(() => {
        try { recognition.start(); } catch (e) {}
      }, 200);
    }
  };
  return recognition;
}

// Старая кнопка микрофона — обычный одиночный режим
function toggleMic() {
  const r = ensureRecognition();
  if (!r) {
    addBotMsg('Микрофон не поддерживается на этом устройстве 😔 Попробуй в Chrome или Safari.', state.subject);
    return;
  }
  if (talkMode) {
    // Если включён режим «Разговор» — кнопка ничего не делает
    return;
  }
  if (isListening) { try { r.stop(); } catch (e) {} return; }
  r.continuous = false;     // одиночный режим
  r.interimResults = false;
  r.lang = state.subject === 'eng' ? 'en-US' : 'ru-RU';
  try { r.start(); } catch (e) {}
}

// =============== РЕЖИМ «РАЗГОВОР» ===============
function toggleTalkMode() {
  if (talkMode) stopTalkMode();
  else startTalkMode();
}

function startTalkMode() {
  const r = ensureRecognition();
  if (!r) {
    addBotMsg('Голосовой режим не поддерживается на этом устройстве 😔 Используй Chrome или Safari.', state.subject);
    return;
  }
  if (!state.subject) pick('free');
  talkMode = true;
  state.voiceOn = true; // в режиме разговор голос обязательно включён
  localStorage.setItem('umnyashka_voice', 'on');
  updateVoiceBtn();
  document.getElementById('talkBtn').classList.add('talking');
  document.getElementById('talkBtn').textContent = '🔴';
  document.getElementById('talkBtn').title = 'Выключить разговор';
  
  // Приветствие в режиме разговора
  addBotMsg('Включила голосовой режим 🎙️ Просто говори — я слушаю. Чтобы выключить, скажи «стоп» или нажми красную кнопку.', state.subject);
  
  // Запускаем распознавание после того как УмняшКа произнесёт приветствие
  setTimeout(() => {
    if (talkMode) startListening();
  }, 4500);
}

function stopTalkMode() {
  talkMode = false;
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
  if (recognition) try { recognition.stop(); } catch (e) {}
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  isSpeaking = false;
  hideTalkStatus();
  const btn = document.getElementById('talkBtn');
  btn.classList.remove('talking');
  btn.textContent = '🎙️';
  btn.title = 'Режим Разговор';
}

function startListening() {
  if (!talkMode || !recognition) return;
  if (isSpeaking) return; // не слушаем пока сами говорим
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = state.subject === 'eng' ? 'en-US' : 'ru-RU';
  try {
    recognition.start();
    showTalkStatus('listening');
  } catch (e) {
    // Уже запущено — игнорируем
  }
}

function showTalkStatus(mode) {
  hideTalkStatus();
  if (!talkMode) return;
  const status = document.createElement('div');
  status.className = 'talk-status';
  status.id = 'talkStatus';
  if (mode === 'listening') {
    status.innerHTML = '<div class="talk-waves"><span></span><span></span><span></span><span></span><span></span></div> Слушаю...';
  } else if (mode === 'thinking') {
    status.innerHTML = '<div class="pulse-dot"></div> Думаю...';
  } else if (mode === 'speaking') {
    status.innerHTML = '🔊 Говорю...';
  }
  document.body.appendChild(status);
}

function hideTalkStatus() {
  const s = document.getElementById('talkStatus');
  if (s) s.remove();
}

// Обработка распознанной речи в режиме «Разговор»
function handleVoiceInput(text) {
  text = text.trim();
  if (!text) return;
  
  // Голосовые команды
  const lower = text.toLowerCase();
  if (/^(стоп|хватит|выключи|закончи|пока|до свидания|хватит говорить)\b/.test(lower)) {
    addUserMsg(text);
    addBotMsg('Хорошо, выключаю голосовой режим. До встречи! 👋', state.subject);
    setTimeout(() => stopTalkMode(), 3000);
    return;
  }
  if (/^(замолчи|тише|молчи|не говори)\b/.test(lower)) {
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    isSpeaking = false;
    return;
  }
  if (/^(очисти|очистить|сотри|сотрите)\s+(чат|историю|всё|все)/.test(lower)) {
    addUserMsg(text);
    document.querySelectorAll('.msg-row, .quick-replies').forEach(el => el.remove());
    addBotMsg('Чат очищен! 🧹 Что разбираем?', state.subject);
    return;
  }
  
  // Голосовое переключение предмета
  const subjMap = {
    'математик': 'math', 'математ': 'math', 'математику': 'math',
    'русский': 'rus', 'русск': 'rus',
    'литератур': 'lit',
    'английск': 'eng', 'инглиш': 'eng', 'english': 'eng',
    'истори': 'hist',
    'географ': 'geo',
    'биолог': 'bio',
    'свободн': 'free',
  };
  for (const [key, code] of Object.entries(subjMap)) {
    if (new RegExp('^(включи|открой|давай|перейди на|переключи на)?\\s*' + key).test(lower) && lower.length < 30) {
      addUserMsg(text);
      pick(code);
      return;
    }
  }
  
  // Обычный вопрос — отправляем как обычно через send()
  document.getElementById('inp').value = text;
  send();
}

// =============== XP ===============
function addXP(n) {
  state.xp += n;
  localStorage.setItem('umnyashka_xp', state.xp);
  updateXP(n);
}

function updateXP(gained) {
  const max = 500;
  const xp = Math.min(state.xp, max);
  const pct = (xp / max) * 100;
  document.getElementById('xpFill').style.width = pct + '%';
  document.getElementById('xpCount').textContent = xp + ' XP';
  // Звёзды
  const starCount = Math.min(5, Math.floor(xp / 100));
  document.getElementById('xpStars').textContent = '★'.repeat(starCount) + '☆'.repeat(5 - starCount);
  // Награда при добавлении XP
  if (gained > 0) {
    const r = document.getElementById('reward');
    r.textContent = `+${gained} XP! 🎉`;
    r.classList.remove('show');
    void r.offsetWidth;
    r.classList.add('show');
  }
}
