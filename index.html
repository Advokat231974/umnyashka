  .mic-btn { background: linear-gradient(135deg, #66bb6a, #43a047); color: #fff; box-shadow: 0 4px 12px rgba(102,187,106,0.4); width: 46px; padding: 0; border-radius: 50%; font-size: 20px; }

</style>
</head>

  for (const n of femaleNames) {
    const v = voices.find(v => v.name.includes(n) && v.lang.startsWith('ru'));
    if (v) { femaleVoiceRu = v; break; }
  }
  if (!femaleVoiceRu) femaleVoiceRu = voices.find(v => v.lang.startsWith('ru')) || null;
  for (const n of femaleNames) {
    const v = voices.find(v => v.name.includes(n) && v.lang.startsWith('en'));
    if (v) { femaleVoiceEn = v; break; }
  }
  if (!femaleVoiceEn) femaleVoiceEn = voices.find(v => v.lang.startsWith('en') && /samantha|karen|victoria|allison|susan|tessa|moira|fiona|serena/i.test(v.name)) || voices.find(v => v.lang.startsWith('en')) || null;
}
if (window.speechSynthesis) { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }

function speak(text, lang) {
  if (!voiceOn || !window.speechSynthesis) return;
  let clean = text.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}•]/gu, '');
  if (lang === 'en') {
    const m = clean.match(/[A-Za-z][A-Za-z\s']+/g);
    if (!m) return;
    clean = m.join('. ');
  } else {
    clean = clean.replace(/[A-Za-z]+/g, '').replace(/\s+/g, ' ').trim();
  }
  if (!clean.trim()) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(clean);
  u.rate = lang === 'en' ? 0.85 : 1.0;
  u.pitch = 1.15;
  u.volume = 1.0;
  if (lang === 'en') { u.lang = 'en-US'; if (femaleVoiceEn) u.voice = femaleVoiceEn; }
  else { u.lang = 'ru-RU'; if (femaleVoiceRu) u.voice = femaleVoiceRu; }
  window.speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceBtn');
  btn.textContent = voiceOn ? '🔊' : '🔇';
  btn.classList.toggle('off', !voiceOn);
  if (!voiceOn && window.speechSynthesis) window.speechSynthesis.cancel();
}

// ===== PHOTO =====
function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  photoMime = file.type;
  const reader = new FileReader();
  reader.onload = (ev) => {
    photoBase64 = ev.target.result.split(',')[1];
    document.getElementById('photoThumb').src = ev.target.result;
    document.getElementById('photoPreview').style.display = 'block';
    document.getElementById('inp').placeholder = 'Добавь вопрос к фото или нажми ⭐ ИИ...';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removePhoto() {
  photoBase64 = null;
  photoMime = null;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoThumb').src = '';
  document.getElementById('inp').placeholder = subject === 'eng' ? 'Напиши или скажи по-английски... 🎤' : 'Напиши вопрос или ответ...';
}

// ===== UI HELPERS =====
function pick(s) {
  subject = s;
  typingLock = false;
  xp = 0;
  chatHistory = [];
  photoBase64 = null;
  photoMime = null;
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('xpFill').style.width = '0%';
  document.getElementById('xpCount').textContent = '0 XP';
  document.getElementById('xpStars').textContent = '☆☆☆☆☆';
  document.querySelectorAll('.subj').forEach(el => el.classList.remove('active'));
  document.querySelector(`.subj[data-s="${s}"]`).classList.add('active');
  document.getElementById('xpWrap').style.display = 'flex';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('aiBtn').disabled = false;
  document.getElementById('inp').placeholder = s === 'eng' ? 'Напиши или скажи по-английски... 🎤' : 'Напиши вопрос или ответ...';
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopMic();
  document.getElementById('chat').innerHTML = '';
  addMsg(SUBJECTS[s].greet, 'bot', false);
  setTimeout(() => addHints(SUBJECTS[s].hints), 400);
}

function addHints(hints) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  hints.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = h;
    btn.onclick = () => { wrap.remove(); submitText(h); };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(text, type, isAI, imgSrc) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;

  const av = document.createElement('div');
  av.className = `msg-av ${type}`;
  av.textContent = type === 'bot' ? '🦉' : '😊';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${type}${isAI ? ' ai-bubble' : ''}`;

  if (type === 'bot' && subject) {
    const tag = document.createElement('span');
    tag.className = isAI ? 'ai-tag' : 'subj-tag';
    tag.style.background = isAI ? '' : (SUBJECTS[subject].color + '22');
    tag.style.color = isAI ? '' : SUBJECTS[subject].color;
    tag.textContent = isAI ? '⭐ ИИ · ' + SUBJECTS[subject].name : SUBJECTS[subject].name;
    bubble.appendChild(tag);
    bubble.appendChild(document.createElement('br'));
  }

  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.className = 'chat-img';
    bubble.appendChild(img);
    bubble.appendChild(document.createElement('br'));
  }

  text.split('\n').forEach((line, i) => {
    if (i > 0) bubble.appendChild(document.createElement('br'));
    bubble.appendChild(document.createTextNode(line));
  });

  if (type === 'bot') {
    const sb = document.createElement('button');
    sb.className = 'speak-btn';
    sb.textContent = '🔊';
    sb.title = 'Послушать';
    sb.onclick = (e) => { e.stopPropagation(); speak(text, SUBJECTS[subject]?.lang || 'ru'); };
    bubble.appendChild(sb);
    if (voiceOn) setTimeout(() => speak(text, SUBJECTS[subject]?.lang || 'ru'), 300);
  }

  row.appendChild(av);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(ai) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-av bot';
  av.textContent = '🦉';
  const bubble = document.createElement('div');
  bubble.className = `bubble bot${ai ? ' ai-bubble' : ''}`;
  bubble.innerHTML = `<div class="${ai ? 'ai-thinking' : 'typing-dots'}"><span></span><span></span><span></span></div>`;
  row.appendChild(av);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

function addXP(amount, praise) {
  xp = Math.min(xp + amount, 500);
  document.getElementById('xpFill').style.width = (xp / 5) + '%';
  document.getElementById('xpCount').textContent = xp + ' XP';
  document.getElementById('xpStars').textContent = '★'.repeat(Math.floor(xp/100)) + '☆'.repeat(5-Math.floor(xp/100));
  if (praise) {
    const r = document.getElementById('reward');
    r.textContent = '+' + amount + ' XP! 🌟';
    r.classList.remove('show');
    void r.offsetWidth;
    r.classList.add('show');
  }
}

// ===== AI CALL =====
async function callAI(userText, imgBase64, imgMime) {
  const s = SUBJECTS[subject];
  const userContent = [];

  if (imgBase64) {
    userContent.push({ type: 'image_url', image_url: { url: `data:${imgMime};base64,${imgBase64}` } });
  }
  userContent.push({ type: 'text', text: userText || 'Помоги разобраться с этим заданием на фото' });

  chatHistory.push({ role: 'user', content: userContent });

  const messages = [
    { role: 'system', content: s.system },
    ...chatHistory.slice(-10)
  ];

  const resp = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
    body: JSON.stringify({ model: AI_MODEL, messages, max_tokens: 800, temperature: 0.7 })
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(err);
  }

  const data = await resp.json();
  const reply = data.choices?.[0]?.message?.content || 'Упс, попробуй ещё раз!';
  chatHistory.push({ role: 'assistant', content: reply });
  return reply;
}

// ===== SEND FUNCTIONS =====
function submitText(text) {
  if (!text.trim() || typingLock) return;
  if (!subject) { addMsg('Сначала выбери предмет вверху! 👆', 'bot', false); return; }
  typingLock = true;
  addMsg(text, 'user');
  addXP(5, false);
  showTyping(false);

  // Simple local responses
  const t = text.toLowerCase();
  let reply = null;

  if (t.match(/привет|hello|hi|хай/)) reply = 'Привет, Руслан! 👋 Как дела? Готов учиться? 🚀';
  else if (t.match(/спасибо|thanks/)) reply = 'Всегда пожалуйста! 😊 Ты отлично справляешься!';
  else if (t.match(/пока|bye|до свидан/)) reply = 'До встречи, Руслан! 👋 Молодец за занятие! 🌟';
  else if (t.match(/не знаю|не понимаю|помоги/)) reply = 'Не беспокойся! 😊 Попробуй нажать кнопку ⭐ ИИ — я разберу подробнее!';

  if (reply) {
    setTimeout(() => { hideTyping(); addMsg(reply, 'bot', false); addXP(5, false); typingLock = false; }, 700);
  } else {
    // Auto-use AI for unknown questions
    setTimeout(() => {
      hideTyping();
      typingLock = false;
      sendAIWithText(text, null, null);
    }, 400);
  }
}

async function sendAIWithText(text, imgB64, imgMime) {
  if (typingLock) return;
  typingLock = true;
  showTyping(true);
  try {
    const reply = await callAI(text, imgB64, imgMime);
    hideTyping();
    addMsg(reply, 'bot', true);
    addXP(25, true);
  } catch(e) {
    hideTyping();
    addMsg('Не смогла связаться с ИИ 😔 Проверь интернет и попробуй ещё раз!', 'bot', false);
  }
  typingLock = false;
}

function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text && !photoBase64) return;
  if (!subject) { addMsg('Сначала выбери предмет вверху! 👆', 'bot', false); return; }
  inp.value = '';
  inp.style.height = 'auto';
  if (text) addMsg(text, 'user');
  removePhoto();
  addXP(5, false);
  submitText(text);
}

async function sendAI() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text && !photoBase64) {
    addMsg('Напиши вопрос или прикрепи фото! 📸', 'bot', false);
    return;
  }
  if (!subject) { addMsg('Сначала выбери предмет вверху! 👆', 'bot', false); return; }

  const imgB64 = photoBase64;
  const imgM = photoMime;
  const imgSrc = imgB64 ? `data:${imgM};base64,${imgB64}` : null;

  inp.value = '';
  inp.style.height = 'auto';

  addMsg(text || '📸 Фото задачи', 'user', false, imgSrc);
  removePhoto();
  addXP(5, false);

  await sendAIWithText(text, imgB64, imgM);
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// ===== MICROPHONE =====
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addMsg('Микрофон не поддерживается. Попробуй Chrome! 🌐', 'bot', false); return;
  }
  isListening ? stopMic() : startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = subject === 'eng' ? 'en-US' : 'ru-RU';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    btn.textContent = '🔴';
    document.getElementById('inp').placeholder = subject === 'eng' ? 'Говори по-английски... 🎤' : 'Говори... 🎤';
  };
  recognition.onresult = (e) => {
    document.getElementById('inp').value = e.results[0][0].transcript;
    stopMic();
    setTimeout(() => send(), 300);
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => stopMic();
  recognition.start();
}

function stopMic() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} }
  const btn = document.getElementById('micBtn');
  if (btn) { btn.classList.remove('listening'); btn.textContent = '🎤'; }
  if (subject) document.getElementById('inp').placeholder = subject === 'eng' ? 'Напиши или скажи по-английски... 🎤' : 'Напиши вопрос или ответ...';
}
